<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Панель ведущего</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-layer"></div>
  <div id="adminScreen" class="screen active">
    <div class="admin-card">
      <h2 style="text-align:center">🎛️ Панель ведущего</h2>
      <div class="stat-grid">
        <div class="stat-box">👦 Мальчиков<div class="stat-val" id="admBoys">0</div></div>
        <div class="stat-box">👧 Девочек<div class="stat-val" id="admGirls">0</div></div>
        <div class="stat-box">Свайпов (синие)<div class="stat-val" id="admBoysSwipes" style="color:#4facfe">0</div></div>
        <div class="stat-box">Свайпов (розовые)<div class="stat-val" id="admGirlsSwipes" style="color:#ff6b6b">0</div></div>
      </div>
      <button class="ctrl-btn btn-start" id="btnStart">▶️ Начать игру</button>
      <button class="ctrl-btn btn-reset" id="btnReset">🔄 Сбросить</button>
      <button class="ctrl-btn btn-qr" onclick="location.href='/'">📱 Назад к QR</button>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
