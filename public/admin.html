<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 Панель ведущего</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-wrap { max-width:500px; margin:0 auto; padding:20px; }
    .card-admin { background:var(--card-bg); padding:20px; border-radius:16px; margin-bottom:15px; border:1px solid rgba(255,255,255,0.1); }
    .row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.1); }
    .row:last-child { border:none; }
    .btn-admin { width:100%; padding:12px; margin:6px 0; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
    .btn-start { background:linear-gradient(90deg,#10b981,#34d399); color:white; }
    .btn-reset { background:linear-gradient(90deg,#ef4444,#f87171); color:white; }
    .btn-demo { background:rgba(139,92,246,0.2); color:white; }
    .pwd-input { width:100%; padding:10px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px; margin-bottom:10px; }
    .hidden { display:none !important; }
    .badge { padding:4px 8px; border-radius:12px; font-size:11px; background:#10b981; color:white; }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="admin-wrap">
    <div id="login-panel" class="card-admin">
      <h2 style="text-align:center;margin-bottom:15px">🔐 Вход ведущего</h2>
      <input type="password" id="pwd" class="pwd-input" placeholder="Пароль">
      <button class="btn-admin btn-start" onclick="checkPwd()">Войти</button>
      <p id="err" style="color:#ef4444;text-align:center;margin-top:10px" class="hidden">Неверный пароль</p>
    </div>

    <div id="main-panel" class="hidden">
      <div class="card-admin">
        <h3 style="margin-bottom:10px">📊 Статус</h3>
        <div class="row"><span>Игроки</span><span><span id="p-boys">0</span> 👦 | <span id="p-girls">0</span> 👧</span></div>
        <div class="row"><span>Свайпы (🔵)</span><span id="s-boys" class="badge">0</span></div>
        <div class="row"><span>Свайпы (🔴)</span><span id="s-girls" class="badge" style="background:#ef4444">0</span></div>
        <div class="row"><span>Состояние</span><span id="g-state">Ожидание</span></div>
      </div>

      <div class="card-admin">
        <h3 style="margin-bottom:10px">🎮 Управление</h3>
        <button class="btn-admin btn-start" onclick="send('start')">▶️ Начать игру</button>
        <button class="btn-admin btn-reset" onclick="send('reset')">🔄 Сбросить</button>
        
        <div style="background:rgba(139,92,246,0.1); padding:12px; border-radius:10px; margin-top:10px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px"><strong>🎭 Демо-режим</strong><small>Тест</small></div>
          <div style="display:flex;gap:10px">
            <button class="btn-admin btn-demo" onclick="send('demo','boys')">+1 👦</button>
            <button class="btn-admin btn-demo" onclick="send('demo','girls')">+1 👧</button>
          </div>
        </div>
      </div>
      <a href="/setup" class="btn-admin" style="background:rgba(255,255,255,0.15); color:white; display:block; text-align:center; text-decoration:none; padding:12px; border-radius:10px;">🔙 Вернуться к QR</a>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let pwd = '';
    function checkPwd() {
      pwd = document.getElementById('pwd').value;
      if(pwd === '3793') {
        document.getElementById('login-panel').classList.add('hidden');
        document.getElementById('main-panel').classList.remove('hidden');
      } else {
        document.getElementById('err').classList.remove('hidden');
      }
    }
    function send(act, team=null) { socket.emit('admin', { action: act, password: pwd, demoTeam: team }); }
    socket.on('playersCount', ({boys,girls}) => { document.getElementById('p-boys').textContent=boys; document.getElementById('p-girls').textContent=girls; });
    socket.on('score', ({team,count}) => document.getElementById(team==='boys'?'s-boys':'s-girls').textContent=count);
    socket.on('start', () => document.getElementById('g-state').textContent='🟢 Игра идёт');
    socket.on('reset', () => { document.getElementById('g-state').textContent='Ожидание'; document.getElementById('s-boys').textContent='0'; document.getElementById('s-girls').textContent='0'; });
    socket.on('gameOver', ({winner}) => document.getElementById('g-state').textContent=`🏆 ${winner==='boys'?'👦':'👧'} победили!`);
    socket.on('adminOk', m => alert(m));
    socket.on('adminError', m => alert(m));
  </script>
</body>
</html>
