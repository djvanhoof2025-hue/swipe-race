<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>🔗 Подключение к игре</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .setup-container { 
      padding: 20px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 25px;
      max-width: 500px;
      margin: 0 auto;
    }
    .qr-card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 20px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .qr-card h3 { margin-bottom: 15px; font-size: 18px; }
    .qr-img {
      width: 200px; height: 200px;
      background: white; border-radius: 12px;
      margin: 10px auto; padding: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px;
    }
    .qr-info { font-size: 13px; opacity: 0.7; margin-top: 10px; }
    .step-badge {
      display: inline-block;
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white; padding: 5px 15px;
      border-radius: 20px; font-size: 12px; font-weight: bold;
      margin-bottom: 10px;
    }
    .admin-link {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 25px;
      background: rgba(255,255,255,0.15);
      color: white; text-decoration: none;
      border-radius: 25px; font-weight: 600;
      transition: 0.2s;
    }
    .admin-link:hover { background: rgba(255,255,255,0.25); }
    .hidden { display: none !important; }
    #serverIp { font-family: monospace; color: #4facfe; }
  </style>
</head>
<body>
  <div class="bg-layer"></div>
  
  <div class="setup-container">
    <h1 style="text-align:center">🎮 Swipe Race</h1>
    
    <!-- ШАГ 1: WiFi -->
    <div class="qr-card" id="step1">
      <span class="step-badge">ШАГ 1 из 2</span>
      <h3>📶 Подключись к сети</h3>
      <div class="qr-img" id="wifiQrPlaceholder">📱</div>
      <p class="qr-info">
        <b>SSID:</b> <span id="wifiSsid">SwipeRace_Host</span><br>
        <b>Пароль:</b> <span id="wifiPass">game1234</span><br>
        <small>Отсканируй QR или подключись вручную</small>
      </p>
      <button class="admin-link" onclick="copyWifi()">📋 Скопировать данные</button>
    </div>

    <!-- ШАГ 2: Игра (появится после кнопки админа) -->
    <div class="qr-card hidden" id="step2">
      <span class="step-badge">ШАГ 2 из 2</span>
      <h3>🌐 Открой игру</h3>
      <div class="qr-img" id="gameQrPlaceholder">🎯</div>
      <p class="qr-info">
        Сервер: <span id="serverIp">http://192.168.43.1:3000</span><br>
        <small>Отсканируй после подключения к WiFi</small>
      </p>
      <a href="/" class="admin-link" style="background:linear-gradient(90deg,#10b981,#34d399)">🚀 Открыть игру сейчас</a>
    </div>

    <!-- Кнопка для админа: показать второй QR -->
    <button id="revealBtn" class="admin-link" style="background:linear-gradient(90deg,#f59e0b,#fbbf24); color:#1a1a2e" onclick="revealGameQr()">
      👉 Я подключился, показать игру
    </button>

    <!-- Ссылка на админку -->
    <a href="/admin.html" class="admin-link">🔐 Панель ведущего</a>
    
    <!-- Кнопка возврата к началу -->
    <button onclick="resetSetup()" style="background:none; border:none; color:rgba(255,255,255,0.5); cursor:pointer; font-size:13px">
      ↩️ Вернуться к подключению WiFi
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    // Загружаем IP с сервера
    fetch('/api/ip')
      .then(r => r.json())
      .then(data => {
        document.getElementById('serverIp').textContent = data.url;
        generateQRs(data.ip, data.port);
      });

    function generateQRs(ip, port) {
      // WiFi QR: формат WIFI:T:WPA;S:SSID;P:PASS;;
      const wifiStr = `WIFI:T:WPA;S:SwipeRace_Host;P:game1234;;`;
      QRCode.toCanvas(document.createElement('canvas'), wifiStr, { width: 200 }, (err, canvas) => {
        if(!err) {
          const placeholder = document.getElementById('wifiQrPlaceholder');
          placeholder.innerHTML = '';
          placeholder.appendChild(canvas);
        }
      });

      // Game URL QR
      const gameUrl = `http://${ip}:${port}/`;
      QRCode.toCanvas(document.createElement('canvas'), gameUrl, { width: 200 }, (err, canvas) => {
        if(!err) {
          const placeholder = document.getElementById('gameQrPlaceholder');
          placeholder.innerHTML = '';
          placeholder.appendChild(canvas);
        }
      });
    }

    function revealGameQr() {
      document.getElementById('step2').classList.remove('hidden');
      document.getElementById('revealBtn').classList.add('hidden');
      // Плавный скролл ко второму шагу
      setTimeout(() => {
        document.getElementById('step2').scrollIntoView({ behavior: 'smooth' });
      }, 100);
    }

    function resetSetup() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('revealBtn').classList.remove('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copyWifi() {
      const text = `WiFi: SwipeRace_Host\nПароль: game1234\n\nПосле подключения отсканируй QR игры:`;
      navigator.clipboard?.writeText(text).then(() => {
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = '✅ Скопировано!';
        setTimeout(() => btn.textContent = original, 2000);
      });
    }
  </script>
</body>
</html>
