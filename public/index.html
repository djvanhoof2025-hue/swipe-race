<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swipe Race</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-layer"></div>
  <div class="container">
    
    <!-- ШАГ 1: WiFi -->
    <div id="step-wifi" class="step active">
      <div class="card">
        <div class="step-badge">ШАГ 1 из 2</div>
        <h2>📶 Подключись к Wi-Fi</h2>
        <div id="wifi-qr" class="qr-box"></div>
        <p class="info">Сеть: <b id="wifi-ssid">SwipeRace</b><br>Пароль: <b id="wifi-pass">game1234</b></p>
        <details class="settings">
          <summary>⚙️ Не подключается? Настроить IP</summary>
          <input type="text" id="manual-ip" placeholder="Введи IP телефона (напр. 192.168.43.1)">
          <button class="btn secondary" onclick="applyManualIp()">Применить</button>
        </details>
        <button class="btn primary" onclick="goStep('step-game')">Далее ➡️</button>
      </div>
    </div>

    <!-- ШАГ 2: Игра -->
    <div id="step-game" class="step">
      <div class="card">
        <div class="step-badge">ШАГ 2 из 2</div>
        <h2>🌐 Подключись к игре</h2>
        <div id="game-qr" class="qr-box"></div>
        <p class="info">Адрес: <span id="server-url">...</span></p>
        <button class="btn success" onclick="startGameClient()">🚀 Войти в игру</button>
        <button class="btn secondary" onclick="goStep('step-wifi')">⬅️ Назад</button>
      </div>
    </div>

    <!-- ШАГ 3: Лобби / Игра -->
    <div id="step-play" class="step">
      <div class="game-header">
        <div class="counter boys">👦 <span id="count-boys">0</span></div>
        <div class="counter girls">👧 <span id="count-girls">0</span></div>
      </div>
      <div class="track-wrap">
        <div class="track">
          <div class="track-line"></div>
          <div class="ball boys" id="ball-boys"></div>
          <div class="ball girls" id="ball-girls"></div>
          <div class="finish-line"></div>
        </div>
      </div>
      
      <div id="lobby-ui">
        <div class="loader"></div>
        <h3>Ожидание игроков...</h3>
        <p>Выбери команду и нажми "Готов"</p>
        <div class="team-select">
          <div class="team-opt boys" onclick="selectTeam('boys')">👦 Мальчики</div>
          <div class="team-opt girls" onclick="selectTeam('girls')">👧 Девочки</div>
        </div>
        <input type="text" id="player-name" placeholder="Твоё имя" value="Игрок">
        <button class="btn success" onclick="joinLobby()">✅ Я готов</button>
      </div>

      <div id="waiting-ui" style="display:none; text-align:center; padding:20px;">
        <div class="loader"></div>
        <h3>⏳ Ждём старт от ведущего</h3>
        <p id="ready-text"></p>
      </div>

      <div class="swipe-zone" id="swipe-zone" style="display:none;">
        <div class="swipe-count" id="my-swipes">0</div>
        <div class="swipe-hint">⬆️</div>
        <div class="swipe-text">Свайпай вверх!</div>
      </div>
      
      <button class="btn secondary" style="margin-top:10px" onclick="location.reload()">🔄 В начало</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
