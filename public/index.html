<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swipe Race</title>
  <link rel="stylesheet" href="style.css">
  <!-- Простая библиотека QR через CDN -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="bg"></div>
  <main class="wrap">
    
    <!-- ШАГ 1: WiFi -->
    <section id="step1" class="step active">
      <div class="card">
        <span class="tag">1 из 2</span>
        <h2>📶 Подключись к Wi-Fi</h2>
        <div id="qr-wifi" class="qr-box"></div>
        <p class="txt">Сеть: <b>SwipeRace</b><br>Пароль: <b>game1234</b></p>
        <button class="btn primary" onclick="nextStep(2)">Далее ➡️</button>
      </div>
    </section>

    <!-- ШАГ 2: Игра -->
    <section id="step2" class="step">
      <div class="card">
        <span class="tag">2 из 2</span>
        <h2>🌐 Открой игру</h2>
        <div id="qr-game" class="qr-box"></div>
        <p class="txt" id="game-url">Адрес: ...</p>
        <button class="btn success" onclick="enterGame()">🚀 Войти</button>
        <button class="btn secondary" onclick="nextStep(1)">⬅️ Назад</button>
      </div>
    </section>

    <!-- ШАГ 3: Игра/Лобби -->
    <section id="step3" class="step">
      <div class="game-ui">
        <header>
          <div class="counter boys">👦 <span id="cnt-b">0</span></div>
          <div class="counter girls">👧 <span id="cnt-g">0</span></div>
        </header>
        
        <div class="track">
          <div class="line"></div>
          <div class="ball boys" id="ball-b"></div>
          <div class="ball girls" id="ball-g"></div>
          <div class="finish"></div>
        </div>

        <!-- Лобби -->
        <div id="lobby" class="panel">
          <div class="loader"></div>
          <h3>Выбери команду</h3>
          <div class="teams">
            <div class="team-btn boys" onclick="setTeam('boys')">👦 Мальчики</div>
            <div class="team-btn girls" onclick="setTeam('girls')">👧 Девочки</div>
          </div>
          <input type="text" id="pname" placeholder="Имя" value="Игрок">
          <button class="btn ok" onclick="joinGame()">✅ Готов</button>
        </div>

        <!-- Ожидание -->
        <div id="waiting" class="panel hide">
          <div class="loader"></div>
          <h3>⏳ Ждём старт...</h3>
          <p id="ready-info"></p>
        </div>

        <!-- Свайп зона -->
        <div id="swipe" class="swipe-zone hide">
          <span class="swipe-count" id="my-count">0</span>
          <div class="swipe-icon">⬆️</div>
          <p>Свайпай вверх!</p>
        </div>

        <button class="btn restart" onclick="location.reload()">🔄 Заново</button>
      </div>
    </section>

  </main>

  <!-- Ссылка на админку в футере -->
  <footer class="admin-link">
    <a href="/admin.html">🔐 Вход для ведущего</a>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
