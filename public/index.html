<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swipe Race</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg"></div>
  
  <!-- ЭКРАН 1: Инструкция + IP -->
  <div id="screen-connect" class="screen active">
    <div class="card">
      <h1>🎮 Swipe Race</h1>
      <p class="step">ШАГ 1: Подключись к Wi-Fi</p>
      <div class="wifi-box">
        <b>Сеть:</b> SwipeRace<br>
        <b>Пароль:</b> game1234
      </div>
      
      <p class="step">ШАГ 2: Открой адрес в браузере</p>
      <div class="ip-box" id="server-ip">http://...</div>
      <button class="btn" onclick="copyIP()">📋 Скопировать</button>
      
      <p class="hint">После подключения нажми "Я в сети"</p>
      <button class="btn primary" onclick="showScreen('screen-login')">✅ Я подключился</button>
    </div>
  </div>

  <!-- ЭКРАН 2: Вход -->
  <div id="screen-login" class="screen">
    <div class="card">
      <h2>👋 Привет!</h2>
      <input type="text" id="pname" placeholder="Твоё имя" value="Игрок">
      
      <div class="teams">
        <div class="team sel" data-t="boys" onclick="pickTeam('boys')">👦 Мальчики</div>
        <div class="team" data-t="girls" onclick="pickTeam('girls')">👧 Девочки</div>
      </div>
      
      <button class="btn primary" onclick="joinGame()">🚀 Войти</button>
      <button class="btn" onclick="showScreen('screen-connect')">⬅️ Назад</button>
    </div>
  </div>

  <!-- ЭКРАН 3: Игра -->
  <div id="screen-game" class="screen">
    <header>
      <div class="sc b">👦 <span id="cb">0</span></div>
      <div class="sc g">👧 <span id="cg">0</span></div>
    </header>
    
    <div class="track">
      <div class="ln"></div>
      <div class="bl b" id="blb"></div>
      <div class="bl g" id="blg"></div>
      <div class="fin"></div>
    </div>

    <!-- Лобби -->
    <div id="ui-wait" class="panel">
      <div class="spin"></div>
      <p>Ждём старт от ведущего...</p>
      <small id="players-info"></small>
    </div>

    <!-- Свайп -->
    <div id="ui-play" class="swipe hide">
      <span class="cnt" id="mc">0</span>
      <div class="ic">⬆️</div>
      <p>Свайпай вверх!</p>
    </div>

    <button class="btn restart" onclick="location.reload()">🔄 Заново</button>
  </div>

  <!-- Ссылка на админку -->
  <div class="admin-link">
    <a href="/admin.html">🔐 Админка</a>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let team = 'boys', playing = false, swipes = 0, myName = 'Игрок';
    let serverIP = '';

    // Получаем IP при загрузке
    fetch('/api/ip').then(r=>r.json()).then(d=>{
      serverIP = d.url;
      document.getElementById('server-ip').textContent = d.url;
    }).catch(()=>{
      document.getElementById('server-ip').textContent = 'http://192.168.43.1:3000';
    });

    // Навигация
    window.showScreen = id => {
      document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    };

    window.copyIP = () => {
      navigator.clipboard?.writeText(serverIP).then(()=>{
        const btn = event.target;
        const old = btn.textContent;
        btn.textContent = '✅ Скопировано!';
        setTimeout(()=>btn.textContent=old, 1500);
      });
    };

    window.pickTeam = t => {
      team = t;
      document.querySelectorAll('.team').forEach(el=>el.classList.remove('sel'));
      document.querySelector(`.team[data-t="${t}"]`).classList.add('sel');
    };

    window.joinGame = () => {
      myName = document.getElementById('pname').value.trim() || 'Игрок';
      socket.emit('join', { name: myName, team });
      showScreen('screen-game');
    };

    // Сокеты
    socket.on('playersCount', ({boys, girls}) => {
      document.getElementById('cb').textContent = boys;
      document.getElementById('cg').textContent = girls;
      document.getElementById('players-info').textContent = `Онлайн: ${boys+girls}`;
    });

    socket.on('start', () => {
      playing = true;
      document.getElementById('ui-wait').classList.add('hide');
      document.getElementById('ui-play').classList.remove('hide');
    });

    socket.on('score', ({team:t, count}) => {
      const p = Math.min(count/50, 1);
      document.getElementById(t==='boys'?'blb':'blg').style.left = `${5+p*80}%`;
    });

    socket.on('gameOver', ({winner}) => {
      playing = false;
      document.getElementById('ui-play').innerHTML = `<h2>🏆 ${winner==='boys'?'👦':'👧'} победили!</h2>`;
    });

    socket.on('reset', () => location.reload());
    socket.on('error', msg => alert(msg));

    // Свайпы
    let sy = 0;
    const zone = document.getElementById('ui-play');
    if(zone) {
      zone.addEventListener('touchstart', e=>{ sy=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
      zone.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
      zone.addEventListener('touchend', e=>{
        if(playing && sy - e.changedTouches[0].clientY > 30) doSwipe();
        e.preventDefault();
      });
      zone.addEventListener('mousedown', e=>sy=e.clientY);
      zone.addEventListener('mouseup', e=>{ if(playing && sy-e.clientY>30) doSwipe(); });
    }

    function doSwipe() {
      swipes++;
      document.getElementById('mc').textContent = swipes;
      socket.emit('swipe', {team});
      // Эффект
      const b = document.createElement('div');
      b.className='burst'; b.textContent=team==='boys'?'💧':'🌸';
      zone.appendChild(b);
      setTimeout(()=>b.remove(), 400);
    }
  </script>
</body>
</html>
